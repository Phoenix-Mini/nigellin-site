name: Nigellin Publish From Sheet

on:
  repository_dispatch:
    types:
      - nigellin_publish_requested

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    outputs:
      publish_status: ${{ steps.result.outputs.publish_status }}
      commit_hash: ${{ steps.result.outputs.commit_hash }}
      published_at: ${{ steps.result.outputs.published_at }}
      error_text: ${{ steps.result.outputs.error_text }}
      request_id: ${{ steps.result.outputs.request_id }}

    steps:
      - name: Validate dispatch payload
        shell: bash
        run: |
          set -euo pipefail
          echo "event_type=${{ github.event.action }}"
          test "${{ github.event.action }}" = "nigellin_publish_requested"
          test -n "${{ github.event.client_payload.sheet_id }}"
          test -n "${{ github.event.client_payload.request_id }}"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Write runtime env
        shell: bash
        run: |
          set -euo pipefail
          cat > .env.local <<EOF
          NIGEL_SHEET_ID=${{ github.event.client_payload.sheet_id }}
          EOF

      - name: Run snapshot
        id: snapshot
        shell: bash
        run: |
          set -euo pipefail
          pnpm snapshot

      - name: Detect snapshot diff
        id: diff
        shell: bash
        run: |
          set -euo pipefail
          if git status --porcelain -- public/data/nigel-archive.json | grep -q .; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push snapshot
        if: steps.diff.outputs.changed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/nigel-archive.json
          git commit -m "content: refresh Nigel archive snapshot"
          git push origin HEAD:main

      - name: Set result outputs
        id: result
        if: success()
        shell: bash
        run: |
          set -euo pipefail
          NOW=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          REQUEST_ID='${{ github.event.client_payload.request_id }}'
          echo "request_id=$REQUEST_ID" >> "$GITHUB_OUTPUT"
          if [ "${{ steps.diff.outputs.changed }}" = "true" ]; then
            HASH=$(git rev-parse --short HEAD)
            echo "publish_status=Published" >> "$GITHUB_OUTPUT"
            echo "commit_hash=$HASH" >> "$GITHUB_OUTPUT"
          else
            echo "publish_status=No content changes to publish" >> "$GITHUB_OUTPUT"
            echo "commit_hash=" >> "$GITHUB_OUTPUT"
          fi
          echo "published_at=$NOW" >> "$GITHUB_OUTPUT"
          echo "error_text=" >> "$GITHUB_OUTPUT"

      - name: Set failure outputs
        id: result_failure
        if: failure()
        shell: bash
        run: |
          set -euo pipefail
          REQUEST_ID='${{ github.event.client_payload.request_id }}'
          echo "request_id=$REQUEST_ID" >> "$GITHUB_OUTPUT"
          echo "publish_status=Publish failed" >> "$GITHUB_OUTPUT"
          echo "commit_hash=" >> "$GITHUB_OUTPUT"
          echo "published_at=" >> "$GITHUB_OUTPUT"
          echo "error_text=Workflow failed before completion" >> "$GITHUB_OUTPUT"

      - name: Callback placeholder
        if: always()
        shell: bash
        run: |
          echo "TODO: call Apps Script callback with request_id/status/commit_hash/published_at/error_text"
