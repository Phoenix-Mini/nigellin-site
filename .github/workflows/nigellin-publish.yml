name: Nigellin Publish From Sheet

on:
  repository_dispatch:
    types:
      - nigellin_publish_requested

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    outputs:
      publish_status: ${{ steps.result.outputs.publish_status }}
      commit_hash: ${{ steps.result.outputs.commit_hash }}
      published_at: ${{ steps.result.outputs.published_at }}
      error_text: ${{ steps.result.outputs.error_text }}
      request_id: ${{ steps.result.outputs.request_id }}

    steps:
      - name: Validate dispatch payload
        shell: bash
        run: |
          set -euo pipefail
          echo "event_type=${{ github.event.action }}"
          test "${{ github.event.action }}" = "nigellin_publish_requested"
          test -n "${{ github.event.client_payload.sheet_id }}"
          test -n "${{ github.event.client_payload.request_id }}"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Materialize Google token JSON
        shell: bash
        env:
          NIGELLIN_GOOGLE_TOKENS_JSON: ${{ secrets.NIGELLIN_GOOGLE_TOKENS_JSON }}
        run: |
          set -euo pipefail
          test -n "$NIGELLIN_GOOGLE_TOKENS_JSON"
          TOKENS_PATH="$RUNNER_TEMP/nigellin-google-tokens.json"
          printf '%s' "$NIGELLIN_GOOGLE_TOKENS_JSON" > "$TOKENS_PATH"
          test -s "$TOKENS_PATH"
          echo "GOOGLE_TOKENS_PATH=$TOKENS_PATH" >> "$GITHUB_ENV"

      - name: Write runtime env
        shell: bash
        run: |
          set -euo pipefail
          cat > .env.local <<EOF
          NIGEL_SHEET_ID=${{ github.event.client_payload.sheet_id }}
          GOOGLE_TOKENS_PATH=${GOOGLE_TOKENS_PATH}
          NIGEL_FAIL_ON_SNAPSHOT_ERROR=1
          EOF
          echo "GOOGLE_TOKENS_PATH=${GOOGLE_TOKENS_PATH}"
          echo "NIGEL_FAIL_ON_SNAPSHOT_ERROR=1"

      - name: Run snapshot
        id: snapshot
        shell: bash
        env:
          GOOGLE_TOKENS_PATH: ${{ env.GOOGLE_TOKENS_PATH }}
          NIGEL_FAIL_ON_SNAPSHOT_ERROR: 1
        run: |
          set -euo pipefail
          pnpm snapshot

      - name: Detect snapshot diff
        id: diff
        shell: bash
        run: |
          set -euo pipefail
          if git status --porcelain -- public/data/nigel-archive.json | grep -q .; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push snapshot
        if: steps.diff.outputs.changed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/nigel-archive.json
          git commit -m "content: refresh Nigel archive snapshot"
          git push origin HEAD:main

      - name: Set result outputs
        id: result
        if: success()
        shell: bash
        run: |
          set -euo pipefail
          NOW=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          REQUEST_ID='${{ github.event.client_payload.request_id }}'
          echo "request_id=$REQUEST_ID" >> "$GITHUB_OUTPUT"
          if [ "${{ steps.diff.outputs.changed }}" = "true" ]; then
            HASH=$(git rev-parse --short HEAD)
            echo "publish_status=Published" >> "$GITHUB_OUTPUT"
            echo "commit_hash=$HASH" >> "$GITHUB_OUTPUT"
          else
            echo "publish_status=No content changes to publish" >> "$GITHUB_OUTPUT"
            echo "commit_hash=" >> "$GITHUB_OUTPUT"
          fi
          echo "published_at=$NOW" >> "$GITHUB_OUTPUT"
          echo "error_text=" >> "$GITHUB_OUTPUT"

      - name: Set failure outputs
        id: result_failure
        if: failure()
        shell: bash
        run: |
          set -euo pipefail
          REQUEST_ID='${{ github.event.client_payload.request_id }}'
          echo "request_id=$REQUEST_ID" >> "$GITHUB_OUTPUT"
          echo "publish_status=Publish failed" >> "$GITHUB_OUTPUT"
          echo "commit_hash=" >> "$GITHUB_OUTPUT"
          echo "published_at=" >> "$GITHUB_OUTPUT"
          echo "error_text=Workflow failed before completion" >> "$GITHUB_OUTPUT"

      - name: Callback Apps Script status endpoint
        if: always() && github.event.client_payload.status_callback_url != '' && secrets.NIGELLIN_STATUS_CALLBACK_TOKEN != ''
        shell: bash
        env:
          CALLBACK_URL: ${{ github.event.client_payload.status_callback_url }}
          CALLBACK_TOKEN: ${{ secrets.NIGELLIN_STATUS_CALLBACK_TOKEN }}
          SHEET_ID: ${{ github.event.client_payload.sheet_id }}
          SHEET_TAB: ${{ github.event.client_payload.sheet_tab }}
          REQUEST_ID: ${{ github.event.client_payload.request_id }}
          RESULT_STATUS: ${{ steps.result.outputs.publish_status || steps.result_failure.outputs.publish_status }}
          RESULT_PUBLISHED_AT: ${{ steps.result.outputs.published_at || steps.result_failure.outputs.published_at }}
          RESULT_COMMIT_HASH: ${{ steps.result.outputs.commit_hash || steps.result_failure.outputs.commit_hash }}
          RESULT_ERROR_TEXT: ${{ steps.result.outputs.error_text || steps.result_failure.outputs.error_text }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          import urllib.request

          payload = {
              'request_id': os.environ['REQUEST_ID'],
              'status': os.environ.get('RESULT_STATUS', ''),
              'published_at': os.environ.get('RESULT_PUBLISHED_AT', ''),
              'commit_hash': os.environ.get('RESULT_COMMIT_HASH', ''),
              'error': os.environ.get('RESULT_ERROR_TEXT', ''),
              'sheet_id': os.environ['SHEET_ID'],
              'sheet_tab': os.environ.get('SHEET_TAB', 'Sheet1'),
              'callback_token': os.environ['CALLBACK_TOKEN'],
          }
          req = urllib.request.Request(
              os.environ['CALLBACK_URL'],
              data=json.dumps(payload).encode('utf-8'),
              headers={'Content-Type': 'application/json'},
              method='POST',
          )
          with urllib.request.urlopen(req, timeout=30) as response:
              body = response.read().decode('utf-8', 'replace')
              print(body)
          PY
